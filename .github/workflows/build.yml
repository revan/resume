name: Build LaTeX PDF

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-recommended

      - name: Build PDF
        run: |
          pdflatex -interaction=nonstopmode revan.tex

      - name: Prepare Pages site
        run: |
          mkdir public
          cp revan.pdf public/revan.pdf

          cat << 'EOF' > public/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Resume: Revan Sopher</title>
            <style>
              body { margin:0; }
              embed { width:100vw; height:100vh; }
            </style>
          </head>
          <body>
            <embed src="revan.pdf" type="application/pdf">
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4